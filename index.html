<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Астероиды - игра на JavaScript</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            text-align: center;
        }
        
        canvas {
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        
        .info {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            color: white;
        }
        
        .controls {
            display: inline-block;
            text-align: left;
            margin: 10px;
        }
        
        button {
            background: #00ff00;
            color: black;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #ff00ff;
            color: white;
            transform: scale(1.05);
        }
        
        h3 {
            margin: 10px 0;
            color: #00ff00;
        }
        
        .score-board {
            font-size: 24px;
            font-weight: bold;
            color: #ff00ff;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1200" height="600"></canvas>
        <div class="info">
            <div class="score-board">Игра "Астероиды"</div>
            <div class="controls">
                <h3>Управление:</h3>
                <p>⬅️ ➡️ - Поворот корабля</p>
                <p>⬆️ - Движение вперед</p>
                <p>💥 При столкновении корабль временно отключается!</p>
            </div>
            <button onclick="location.reload()">🔄 Перезапустить игру</button>
        </div>
    </div>
    
    <script src="Asteroid.js"></script>
    <script src="AsteroidManager.js"></script>
    <script src="main.js"></script>
</body>
</html>
